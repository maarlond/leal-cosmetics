<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Poppins", sans-serif;
        min-height: 100vh;
        margin: 0;

        background-image: url("https://png.pngtree.com/background/20211215/original/pngtree-perfume-hand-spraying-perfume-on-black-background-picture-image_1469293.jpg");
        background-size: cover;
        background-position: center;

        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      /* overlay */

      body::before {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #000000aa, #ffffffcc);
        backdrop-filter: blur(3px);
        z-index: -1;
      }

      /* partículas */

      #particles {
        position: absolute;
        width: 100%;
        height: 100%;
        z-index: -2;
      }

      /* container */

      .container-login {
        position: relative;
        max-width: 1100px;
        width: 100%;
      }

      /* login card */

      .login-card {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(10px);
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
        max-width: 380px;
        width: 100%;
        margin: auto;

        animation: subir 0.8s ease;
      }

      @keyframes subir {
        from {
          opacity: 0;
          transform: translateY(40px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* logo */

      .logo-login {
        font-size: 26px;
        font-weight: 600;
        color: #b56df5;
        text-align: center;
        margin-bottom: 10px;
      }

      /* título */

      .login-title {
        font-weight: 600;
        color: #7a3c8c;
      }

      /* botão */

      .btn-login {
        background: linear-gradient(135deg, #d292ff, #b56df5);
        border: none;
        color: white;
        padding: 12px;
        border-radius: 8px;
        font-weight: 600;
        transition: 0.3s;
        width: 100%;
      }

      .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      }

      /* senha */

      .senha-container {
        position: relative;
      }

      .toggle-senha {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
      }

      /* texto animado */

      .exemplo-texto {
        font-size: 1.6rem;
        font-weight: 600;
        color: #d292ff;
        max-width: 500px;
        line-height: 1.6;
        white-space: pre-wrap;
        border-right: 3px solid #d292ff;
        padding-right: 8px;
        animation: piscarCursor 0.8s infinite;
      }

      @keyframes piscarCursor {
        0%,
        50% {
          border-color: #d292ff;
        }
        51%,
        100% {
          border-color: transparent;
        }
      }

      /* RESPONSIVO */

      @media (max-width: 768px) {
        .exemplo-texto {
          font-size: 1.2rem;
          text-align: center;
          border-right: none;
          margin-bottom: 25px;
        }

        .login-card {
          max-width: 100%;
          padding: 30px;
        }
      }
    </style>
  </head>

  <body>
    <div id="particles"></div>

    <div class="container container-login">
      <div class="row align-items-center">
        <!-- TEXTO -->

        <div
          class="col-12 col-md-6 d-flex justify-content-center text-center mb-4 mb-md-0"
        >
          <div id="textoExemplo" class="exemplo-texto"></div>
        </div>

        <!-- LOGIN -->

        <div class="col-12 col-md-6 d-flex justify-content-center">
          <div class="login-card">
            <div class="logo-login">💜 Leal Cosméticos</div>

            <h4 class="text-center mb-4 login-title">Bem vindo!</h4>

            <form>
              <div class="mb-4">
                <input
                  type="email"
                  id="email"
                  class="form-control form-control-lg"
                  placeholder="Email"
                />
              </div>

              <div class="mb-4 senha-container">
                <input
                  type="password"
                  id="senha"
                  class="form-control form-control-lg"
                  placeholder="Senha"
                />

                <span class="toggle-senha" onclick="toggleSenha()">
                  <i class="fa fa-eye"></i>
                </span>
              </div>

              <button
                id="btnLogin"
                type="button"
                class="btn-login"
                onclick="login()"
              >
                Entrar
              </button>

              <p class="text-center mt-3">
                Não possui conta?
                <a href="cadastro.html">Cadastrar</a>
              </p>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

    <script>
      tsParticles.load("particles", {
        particles: {
          number: { value: 40 },
          color: { value: "#d292ff" },
          shape: { type: "circle" },
          opacity: { value: 0.4 },
          size: { value: { min: 1, max: 4 } },
          move: {
            enable: true,
            speed: 1,
            random: true,
            outModes: { default: "out" },
          },
        },
      });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/login.js"></script>
    <script src="../js/script.js"></script>
  </body>
</html>
