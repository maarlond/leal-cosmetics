<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />

    <link rel="stylesheet" href="./css/style.css" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/6.4.0/mdb.min.css"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Poppins", sans-serif;

        height: 100vh;

        margin: 0;

        background-image: url("https://thecurvyfashionista.com/wp-content/uploads/2026/02/a-hand-elegantly-spritzing-perfume-from-a-decorative-bottle-against-a-dark-background.-31707005-scaled.jpg");

        background-size: cover;

        background-position: center;

        display: flex;

        align-items: center;

        justify-content: center;
      }

      /* overlay suave */

      body::before {
        content: "";

        position: absolute;

        width: 100%;

        height: 100%;

        background: linear-gradient(135deg, #cf91a6aa, #ffffffcc);

        backdrop-filter: blur(3px);
      }

      /* card */

      .cadastro-card {
        position: relative;

        background: rgba(255, 255, 255, 0.9);

        backdrop-filter: blur(10px);

        padding: 40px;

        border-radius: 16px;

        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);

        width: 380px;
      }

      /* botão */

      .btn-cadastro {
        background: linear-gradient(135deg, #d292ff, #b56df5);

        border: none;

        color: white;

        padding: 12px;

        border-radius: 8px;

        font-weight: 600;

        width: 100%;

        transition: 0.3s;
      }

      .btn-cadastro:hover {
        transform: translateY(-2px);

        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      }

      /* título */

      .login-title {
        font-weight: 600;

        color: #7a3c8c;
      }

      /* senha */

      .senha-container {
        position: relative;
      }

      .toggle-senha {
        position: absolute;

        right: 15px;

        top: 50%;

        transform: translateY(-50%);

        cursor: pointer;
      }

      /* autofill fix */

      input:-webkit-autofill {
        -webkit-box-shadow: 0 0 0px 1000px white inset !important;

        -webkit-text-fill-color: #000;
      }
    </style>
  </head>

  <body>
    <div class="cadastro-card">
      <h4 class="text-center mb-4 login-title">🌸 Criar Conta</h4>

      <form id="formCadastro">
        <!-- NOME -->

        <div class="form-outline mb-4">
          <input
            type="text"
            id="nome"
            class="form-control form-control-lg"
            required
          />

          <label class="form-label">Nome completo</label>
        </div>

        <!-- EMAIL -->

        <div class="form-outline mb-4">
          <input
            type="email"
            id="email"
            class="form-control form-control-lg"
            required
          />

          <label class="form-label">Email</label>
        </div>

        <!-- SENHA -->

        <div class="form-outline mb-4 senha-container">
          <input
            type="password"
            id="senha"
            class="form-control form-control-lg"
            required
          />

          <label class="form-label">Senha</label>

          <span class="toggle-senha" onclick="toggleSenha()">
            <i class="fa fa-eye"></i>
          </span>
        </div>

        <!-- CONFIRMAR SENHA -->

        <div class="form-outline mb-4">
          <input
            type="password"
            id="confirmaSenha"
            class="form-control form-control-lg"
            required
          />

          <label class="form-label">Confirmar senha</label>
        </div>

        <button type="submit" class="btn-cadastro">Cadastrar</button>

        <p class="text-center mt-3">
          Já possui uma conta?

          <a href="login.html">Login</a>
        </p>
      </form>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/6.4.0/mdb.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="../js/script.js"></script>

    <script src="../js/cadastro.js"></script>
  </body>
</html>
