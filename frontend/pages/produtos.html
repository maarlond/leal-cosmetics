    <div class="top-bar">
        <button class="btnNovo" onclick="abrirModalProduto()">
            + Novo Produto
        </button>
    </div>
    <!-- Tabela de produtos -->
    <div class="table-container">
        <table id="tabelaProdutos" class="display nowrap" style="width:100%">
            <thead>
                <tr>
                    <th>Produto</th>
                    <th>Código</th>
                    <th>Marca</th>
                    <th>Quantidade</th>
                    <th>Preço Custo</th>
                    <th>Preço Venda</th>
                    <th>Valor Total em Estoque</th>
                    <th>Valor Total de lucro</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tfoot>
                <tr>
                    <td colspan="6" style="font-weight: bold;">Totais:</td>
                    <td style="text-align: center;" id="totalEstoque"></td>
                    <td style="text-align: center;" id="totalLucro"></td>
                </tr>
            </tfoot>
            <tbody id="listaProdutos"></tbody>
        </table>

        <div id="modalProduto" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Novo Produto</h3>
                    <button class="btnFechar" onclick="fecharModalProduto()">✖</button>
                </div>
                <form id="formProduto" onsubmit="event.preventDefault(); adicionarProduto();">
                    <div class="form-grid">
                        <input type="text" id="nome" placeholder="Nome do Produto" required>
                        <input type="text" id="codigo" placeholder="Código do Produto">
                        <select id="marca">
                            <option value="Boticário">Boticário</option>
                            <option value="Eudora">Eudora</option>
                        </select>

                        <input type="number" id="quantidade" placeholder="Quantidade">

                        <input type="number" id="preco_custo" placeholder="Preço de Custo" step="0.01">

                        <input type="number" id="preco_venda" placeholder="Preço de Venda" step="0.01">

                    </div>
                    <!-- Upload imagem -->
                    <div class="upload-imagem">

                        <label>Imagem do Produto</label>

                        <input type="file" id="imagemProduto" accept="image/*">

                        <img id="previewImagem" class="preview-img">

                    </div>

                    <div class="modal-botoes">

                        <button type="button" class="btnCancelar" onclick="fecharModalProduto()">
                            Cancelar
                        </button>

                        <button type="submit" class="btnSalvar">
                            Salvar Produto
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
