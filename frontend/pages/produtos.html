<!-- produtos.html -->
<style>
  .prod-wrap * {
    box-sizing: border-box;
  }

  .prod-wrap {
    padding: 32px 28px;
    min-height: 100%;
    font-family: "Inter", system-ui, sans-serif;
    color: #1a1a1a;
    background: #f5f3f0;
  }

  /* ── CABEÇALHO ── */
  .prod-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 24px;
  }

  .prod-title {
    font-size: 1.9rem;
    font-weight: 700;
    line-height: 1.1;
  }
  .prod-subtitle {
    color: #888;
    font-size: 0.92rem;
    margin-top: 4px;
  }

  .btn-novo {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 10px 20px;
    background: #663894;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 0.92rem;
    font-weight: 600;
    cursor: pointer;
    transition:
      background 0.2s,
      transform 0.15s;
    white-space: nowrap;
  }
  .btn-novo:hover {
    background: #7c3aed;
    transform: translateY(-1px);
  }

  /* ── TOOLBAR ── */
  .prod-toolbar {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }
  .search-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: #aaa;
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    padding: 10px 14px 10px 42px;
    border: 1.5px solid #e5e0da;
    border-radius: 10px;
    background: #fff;
    font-size: 0.92rem;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  .search-input:focus {
    border-color: #8b5cf6;
  }

  .filtro-select {
    padding: 10px 14px;
    border: 1.5px solid #e5e0da;
    border-radius: 10px;
    background: #fff;
    font-size: 0.88rem;
    color: #555;
    outline: none;
    cursor: pointer;
    font-family: inherit;
    transition: border-color 0.2s;
    min-width: 150px;
  }
  .filtro-select:focus {
    border-color: #8b5cf6;
  }

  .view-toggle {
    display: flex;
    gap: 4px;
    background: #fff;
    border: 1.5px solid #e5e0da;
    border-radius: 10px;
    padding: 4px;
  }
  .view-btn {
    width: 34px;
    height: 34px;
    border: none;
    border-radius: 7px;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #aaa;
    transition:
      background 0.15s,
      color 0.15s;
  }
  .view-btn.ativo {
    background: #663894;
    color: #fff;
  }

  /* ── GRID DE CARDS ── */
  .produtos-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 18px;
  }

  .produto-card {
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 1px 6px rgba(0, 0, 0, 0.05);
    transition:
      transform 0.2s,
      box-shadow 0.2s;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .produto-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
  }

  .card-img-wrap {
    width: 100%;
    height: 200px;
    overflow: hidden;
    background: #f0edf8;
    position: relative;
    flex-shrink: 0;
  }
  .card-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s;
  }
  .produto-card:hover .card-img-wrap img {
    transform: scale(1.04);
  }

  .card-img-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3.5rem;
    background: linear-gradient(135deg, #f0edf8, #e8e3f5);
  }

  .badge-qtd {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(255, 255, 255, 0.92);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 0.75rem;
    font-weight: 700;
    color: #555;
    backdrop-filter: blur(4px);
  }
  .badge-esgotado {
    position: absolute;
    top: 10px;
    left: 10px;
    background: #e74c3c;
    color: #fff;
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 0.75rem;
    font-weight: 700;
  }
  .badge-baixo-estoque {
    position: absolute;
    top: 10px;
    right: 10px;
    background: #f59e0b;
    color: #fff;
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 0.75rem;
    font-weight: 700;
  }

  .card-body {
    padding: 16px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .card-marca {
    font-size: 0.72rem;
    font-weight: 700;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }

  .card-nome {
    font-size: 1rem;
    font-weight: 700;
    color: #1a1a1a;
    line-height: 1.3;
  }

  .card-desc {
    font-size: 0.82rem;
    color: #888;
    line-height: 1.4;
    flex: 1;
    min-height: 36px;
  }

  .card-preco-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 8px;
  }

  .card-preco {
    font-size: 1.15rem;
    font-weight: 800;
    color: #8b5cf6;
  }

  .card-estoque-info {
    font-size: 0.78rem;
    color: #aaa;
    font-weight: 500;
  }
  .card-estoque-info.baixo {
    color: #f59e0b;
    font-weight: 600;
  }
  .card-estoque-info.zero {
    color: #e74c3c;
    font-weight: 600;
  }

  .card-footer {
    padding: 12px 16px;
    border-top: 1px solid #f5f3f0;
    display: flex;
    gap: 8px;
  }

  .btn-editar-card {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 8px;
    background: #f5f3f0;
    border: none;
    border-radius: 8px;
    font-size: 0.82rem;
    font-weight: 600;
    color: #555;
    cursor: pointer;
    transition: background 0.15s;
    font-family: inherit;
  }
  .btn-editar-card:hover {
    background: #ede9ff;
    color: #7c3aed;
  }

  .btn-remover-card {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f5f3f0;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    color: #ccc;
    transition:
      background 0.15s,
      color 0.15s;
    flex-shrink: 0;
  }
  .btn-remover-card:hover {
    background: #fee2e2;
    color: #e74c3c;
  }

  /* ── VISTA LISTA ── */
  .produtos-grid.lista {
    grid-template-columns: 1fr;
    gap: 10px;
  }
  .produtos-grid.lista .produto-card {
    flex-direction: row;
    align-items: center;
  }
  .produtos-grid.lista .card-img-wrap {
    width: 80px;
    height: 80px;
    flex-shrink: 0;
    border-radius: 0;
  }
  .produtos-grid.lista .card-body {
    flex-direction: row;
    align-items: center;
    padding: 12px 16px;
    gap: 20px;
  }
  .produtos-grid.lista .card-nome {
    min-width: 160px;
    font-size: 0.92rem;
  }
  .produtos-grid.lista .card-desc {
    display: none;
  }
  .produtos-grid.lista .card-marca {
    display: none;
  }
  .produtos-grid.lista .card-preco-row {
    margin-top: 0;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }
  .produtos-grid.lista .card-footer {
    border-top: none;
    border-left: 1px solid #f5f3f0;
    padding: 12px;
    flex-shrink: 0;
  }

  /* ── VAZIO ── */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: #bbb;
  }
  .empty-state svg {
    margin-bottom: 16px;
    opacity: 0.3;
  }
  .empty-state p {
    font-size: 0.95rem;
  }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.45);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(3px);
  }
  .modal-overlay.aberto {
    display: flex;
  }

  .modal-box {
    background: #fff;
    border-radius: 20px;
    padding: 32px;
    width: 100%;
    max-width: 540px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
    animation: modalIn 0.2s ease;
  }

  @keyframes modalIn {
    from {
      transform: translateY(20px);
      opacity: 0;
    }
    to {
      transform: translateY(0);
      opacity: 1;
    }
  }

  .modal-header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .modal-titulo {
    font-size: 1.2rem;
    font-weight: 700;
  }

  .btn-fechar {
    background: #f5f3f0;
    border: none;
    width: 34px;
    height: 34px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #888;
    transition: background 0.15s;
  }
  .btn-fechar:hover {
    background: #fee2e2;
    color: #e74c3c;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 16px;
  }
  .form-grid .full {
    grid-column: 1 / -1;
  }

  .campo-label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    color: #555;
    margin-bottom: 5px;
  }
  .campo-label .req {
    color: #e74c3c;
  }

  .campo-input,
  .campo-select {
    width: 100%;
    padding: 9px 12px;
    border: 1.5px solid #e5e0da;
    border-radius: 9px;
    font-size: 0.9rem;
    color: #1a1a1a;
    background: #fff;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  .campo-input:focus,
  .campo-select:focus {
    border-color: #8b5cf6;
  }

  .upload-area {
    border: 2px dashed #e5e0da;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition:
      border-color 0.2s,
      background 0.2s;
    margin-bottom: 20px;
  }
  .upload-area:hover {
    border-color: #8b5cf6;
    background: #faf9ff;
  }
  .upload-area input[type="file"] {
    display: none;
  }
  .upload-area .upload-icon {
    font-size: 2rem;
    margin-bottom: 8px;
  }
  .upload-area .upload-text {
    font-size: 0.83rem;
    color: #888;
  }

  .preview-img {
    max-width: 100%;
    max-height: 140px;
    border-radius: 10px;
    display: none;
    margin: 10px auto 0;
  }

  .modal-botoes {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .btn-cancelar {
    padding: 10px 20px;
    background: #f5f3f0;
    border: none;
    border-radius: 9px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    color: #555;
    transition: background 0.15s;
    font-family: inherit;
  }
  .btn-cancelar:hover {
    background: #ede9ff;
  }

  .btn-salvar {
    padding: 10px 24px;
    background: #8b5cf6;
    color: #fff;
    border: none;
    border-radius: 9px;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
    font-family: inherit;
  }
  .btn-salvar:hover {
    background: #7c3aed;
  }

  @media (max-width: 600px) {
    .prod-wrap {
      padding: 20px 16px;
    }
    .form-grid {
      grid-template-columns: 1fr;
    }
    .modal-box {
      padding: 24px 18px;
    }
    .produtos-grid {
      grid-template-columns: 1fr 1fr;
    }
  }
</style>

<div class="prod-wrap">
  <div class="prod-header">
    <div>
      <h1 class="prod-title">Produtos</h1>
      <p class="prod-subtitle" id="subtitleProdutos">Carregando...</p>
    </div>
    <button class="btn-novo" onclick="abrirModalProduto()">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M5 12h14" />
        <path d="M12 5v14" />
      </svg>
      Novo Produto
    </button>
  </div>

  <div class="prod-toolbar">
    <div class="search-wrap">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="17"
        height="17"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <circle cx="11" cy="11" r="8" />
        <path d="m21 21-4.3-4.3" />
      </svg>
      <input
        class="search-input"
        type="text"
        id="buscaProduto"
        placeholder="Buscar produto..."
        oninput="filtrarProdutos()"
      />
    </div>

    <select class="filtro-select" id="filtroMarca" onchange="filtrarProdutos()">
      <option value="">Todas as Marcas</option>
    </select>

    <select
      class="filtro-select"
      id="filtroEstoque"
      onchange="filtrarProdutos()"
    >
      <option value="">Todos os Estoques</option>
      <option value="disponivel">Disponível</option>
      <option value="baixo">Estoque Baixo (≤5)</option>
      <option value="esgotado">Esgotado</option>
    </select>

    <div class="view-toggle">
      <button
        class="view-btn ativo"
        id="btnGrade"
        onclick="alterarView('grade')"
        title="Grade"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <rect width="7" height="7" x="3" y="3" rx="1" />
          <rect width="7" height="7" x="14" y="3" rx="1" />
          <rect width="7" height="7" x="3" y="14" rx="1" />
          <rect width="7" height="7" x="14" y="14" rx="1" />
        </svg>
      </button>
      <button
        class="view-btn"
        id="btnLista"
        onclick="alterarView('lista')"
        title="Lista"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M8 6h13" />
          <path d="M8 12h13" />
          <path d="M8 18h13" />
          <path d="M3 6h.01" />
          <path d="M3 12h.01" />
          <path d="M3 18h.01" />
        </svg>
      </button>
    </div>
  </div>

  <div class="produtos-grid" id="gridProdutos"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalProduto">
  <div class="modal-box">
    <div class="modal-header-row">
      <span class="modal-titulo" id="modalTitulo">Novo Produto</span>
      <button class="btn-fechar" onclick="fecharModalProduto()">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M18 6 6 18" />
          <path d="m6 6 12 12" />
        </svg>
      </button>
    </div>

    <form id="formProduto">
      <div class="form-grid">
        <div class="full">
          <label class="campo-label">Nome <span class="req">*</span></label>
          <input
            class="campo-input"
            type="text"
            id="nome"
            placeholder="Ex: Sérum Facial Vitamina C"
            required
          />
        </div>
        <div>
          <label class="campo-label">Código</label>
          <input
            class="campo-input"
            type="text"
            id="codigo"
            placeholder="Código"
          />
        </div>
        <div>
          <label class="campo-label">Marca</label>
          <select class="campo-select" id="marca">
            <option value="Boticário">Boticário</option>
            <option value="Eudora">Eudora</option>
            <option value="Natura">Natura</option>
            <option value="Avon">Avon</option>
            <option value="Outra">Outra</option>
          </select>
        </div>
        <div>
          <label class="campo-label"
            >Quantidade <span class="req">*</span></label
          >
          <input
            class="campo-input"
            type="number"
            id="quantidade"
            placeholder="0"
            min="0"
            required
          />
        </div>
        <div>
          <label class="campo-label"
            >Preço de Custo <span class="req">*</span></label
          >
          <input
            class="campo-input"
            type="number"
            id="preco_custo"
            placeholder="0,00"
            step="0.01"
            min="0"
            required
          />
        </div>
        <div>
          <label class="campo-label"
            >Preço de Venda <span class="req">*</span></label
          >
          <input
            class="campo-input"
            type="number"
            id="preco_venda"
            placeholder="0,00"
            step="0.01"
            min="0"
            required
          />
        </div>
        <div class="full">
          <label class="campo-label">Descrição</label>
          <input
            class="campo-input"
            type="text"
            id="descricao"
            placeholder="Breve descrição (opcional)"
          />
        </div>
      </div>

      <div
        class="upload-area"
        onclick="document.getElementById('imagemProduto').click()"
      >
        <input
          type="file"
          id="imagemProduto"
          accept="image/*"
          onchange="previewImagemModal(event)"
        />
        <div class="upload-icon">📷</div>
        <div class="upload-text">
          Clique para adicionar imagem<br /><small>(opcional)</small>
        </div>
        <img id="previewImagem" class="preview-img" />
      </div>

      <div class="modal-botoes">
        <button
          type="button"
          class="btn-cancelar"
          onclick="fecharModalProduto()"
        >
          Cancelar
        </button>
        <button type="submit" class="btn-salvar">Salvar Produto</button>
      </div>
    </form>
  </div>
</div>

<script>
  var _listaProdutos = [];

  // Sobrescreve iniciarTabelaProdutos — não usa mais DataTable aqui
  function iniciarTabelaProdutos() {
    if (!document.getElementById("gridProdutos")) return;
    carregarProdutos();
  }

  async function carregarProdutos() {
    try {
      var res = await fetch(API_URL + "/produtos", { headers: getHeaders() });
      if (!res.ok) throw new Error();
      _listaProdutos = await res.json();
      preencherFiltroMarcas();
      filtrarProdutos();
      var sub = document.getElementById("subtitleProdutos");
      if (sub)
        sub.textContent = _listaProdutos.length + " produto(s) cadastrado(s)";
    } catch (e) {
      var g = document.getElementById("gridProdutos");
      if (g)
        g.innerHTML =
          '<div class="empty-state"><p>Não foi possível carregar os produtos.</p></div>';
    }
  }

  function preencherFiltroMarcas() {
    var sel = document.getElementById("filtroMarca");
    if (!sel) return;
    var marcas = [
      ...new Set(
        _listaProdutos
          .map(function (p) {
            return p.marca;
          })
          .filter(Boolean),
      ),
    ];
    sel.innerHTML =
      '<option value="">Todas as Marcas</option>' +
      marcas
        .map(function (m) {
          return '<option value="' + m + '">' + m + "</option>";
        })
        .join("");
  }

  function filtrarProdutos() {
    var busca = (document.getElementById("buscaProduto").value || "")
      .toLowerCase()
      .trim();
    var marca = document.getElementById("filtroMarca").value;
    var estoque = document.getElementById("filtroEstoque").value;

    var lista = _listaProdutos.filter(function (p) {
      var okBusca =
        !busca ||
        p.nome.toLowerCase().includes(busca) ||
        (p.marca || "").toLowerCase().includes(busca) ||
        (p.codigo || "").toLowerCase().includes(busca);
      var okMarca = !marca || p.marca === marca;
      var qtd = p.quantidade ?? 0;
      var okEstoque =
        !estoque ||
        (estoque === "disponivel" && qtd > 5) ||
        (estoque === "baixo" && qtd > 0 && qtd <= 5) ||
        (estoque === "esgotado" && qtd <= 0);
      return okBusca && okMarca && okEstoque;
    });

    renderCards(lista);
  }

  function renderCards(lista) {
    var grid = document.getElementById("gridProdutos");
    if (!grid) return;

    if (!lista.length) {
      grid.innerHTML =
        '<div class="empty-state"><svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 21.73a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73z"/><path d="M12 22V12"/></svg><p>Nenhum produto encontrado</p></div>';
      return;
    }

    grid.innerHTML = lista
      .map(function (p) {
        var qtd = p.quantidade ?? 0;
        var preco = parseFloat(p.preco_venda ?? 0);
        var esgot = qtd <= 0;
        var baixo = qtd > 0 && qtd <= 5;

        var badge = esgot
          ? '<span class="badge-esgotado">Esgotado</span>'
          : baixo
            ? '<span class="badge-baixo-estoque">' + qtd + " un.</span>"
            : '<span class="badge-qtd">' + qtd + " un.</span>";

        var img = p.imagemproduto
          ? '<img src="' +
            p.imagemproduto +
            '" alt="' +
            p.nome +
            '" onerror="this.parentElement.innerHTML=\'<div class=card-img-placeholder>💄</div>\'" />'
          : '<div class="card-img-placeholder">💄</div>';

        var estoqueClass = esgot ? "zero" : baixo ? "baixo" : "";
        var estoqueTexto = esgot ? "0 em estoque" : qtd + " em estoque";
        var prodJson = JSON.stringify(p).replace(/'/g, "\\'");

        return (
          '<div class="produto-card">' +
          '<div class="card-img-wrap">' +
          img +
          badge +
          "</div>" +
          '<div class="card-body">' +
          '<div class="card-marca">' +
          (p.marca || "") +
          "</div>" +
          '<div class="card-nome">' +
          p.nome +
          "</div>" +
          '<div class="card-desc">' +
          (p.descricao || "") +
          "</div>" +
          '<div class="card-preco-row">' +
          '<span class="card-preco">R$ ' +
          preco.toFixed(2).replace(".", ",") +
          "</span>" +
          '<span class="card-estoque-info ' +
          estoqueClass +
          '">' +
          estoqueTexto +
          "</span>" +
          "</div>" +
          "</div>" +
          '<div class="card-footer">' +
          '<button class="btn-editar-card" onclick=\'editarProduto(' +
          JSON.stringify(p) +
          ")'>" +
          '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>' +
          " Editar" +
          "</button>" +
          '<button class="btn-remover-card" onclick="removerProduto(' +
          p.id +
          ')" title="Remover">' +
          '<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>' +
          "</button>" +
          "</div>" +
          "</div>"
        );
      })
      .join("");
  }

  function alterarView(view) {
    var grid = document.getElementById("gridProdutos");
    if (view === "lista") {
      grid.classList.add("lista");
      document.getElementById("btnLista").classList.add("ativo");
      document.getElementById("btnGrade").classList.remove("ativo");
    } else {
      grid.classList.remove("lista");
      document.getElementById("btnGrade").classList.add("ativo");
      document.getElementById("btnLista").classList.remove("ativo");
    }
  }

  function abrirModalProduto() {
    produtoEditando = null;
    document.getElementById("formProduto").reset();
    document.getElementById("previewImagem").style.display = "none";
    document.getElementById("modalTitulo").textContent = "Novo Produto";
    document.getElementById("modalProduto").classList.add("aberto");
  }

  function fecharModalProduto() {
    document.getElementById("modalProduto").classList.remove("aberto");
  }

  document
    .getElementById("modalProduto")
    .addEventListener("click", function (e) {
      if (e.target === this) fecharModalProduto();
    });

  function editarProduto(produto) {
    document.getElementById("nome").value = produto.nome;
    document.getElementById("codigo").value = produto.codigo || "";
    document.getElementById("marca").value = produto.marca;
    document.getElementById("quantidade").value = produto.quantidade;
    document.getElementById("preco_custo").value = produto.preco_custo;
    document.getElementById("preco_venda").value = produto.preco_venda;
    document.getElementById("descricao").value = produto.descricao || "";
    produtoEditando = produto.id;
    document.getElementById("modalTitulo").textContent = "Editar Produto";
    document.getElementById("modalProduto").classList.add("aberto");
  }

  function previewImagemModal(event) {
    var file = event.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function (e) {
      var img = document.getElementById("previewImagem");
      img.src = e.target.result;
      img.style.display = "block";
    };
    reader.readAsDataURL(file);
  }
</script>
