<!-- produtos.html -->
<style>
  /* ── RESET LOCAL ── */
  .prod-wrap * {
    box-sizing: border-box;
  }

  .prod-wrap {
    padding: 32px 28px;
    min-height: 100%;
    font-family: "Inter", system-ui, sans-serif;
    color: #1a1a1a;
    background: #f5f3f0;
  }

  /* ── CABEÇALHO ── */
  .prod-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 24px;
  }

  .prod-title {
    font-size: 1.9rem;
    font-weight: 700;
    line-height: 1.1;
  }
  .prod-subtitle {
    color: #888;
    font-size: 0.92rem;
    margin-top: 4px;
  }

  .btn-novo {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 10px 20px;
    background: #8b5cf6;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 0.92rem;
    font-weight: 600;
    cursor: pointer;
    transition:
      background 0.2s,
      transform 0.15s;
    white-space: nowrap;
  }
  .btn-novo:hover {
    background: #7c3aed;
    transform: translateY(-1px);
  }

  /* ── CARDS DE RESUMO ── */
  .resumo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }

  .resumo-card {
    background: #fff;
    border-radius: 14px;
    padding: 18px 20px;
    box-shadow: 0 1px 6px rgba(0, 0, 0, 0.05);
  }

  .resumo-card .rc-label {
    font-size: 0.78rem;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 6px;
  }

  .resumo-card .rc-valor {
    font-size: 1.35rem;
    font-weight: 800;
    color: #8b5cf6;
  }

  .resumo-card .rc-valor.verde {
    color: #10b981;
  }
  .resumo-card .rc-valor.azul {
    color: #3b82f6;
  }

  /* ── TABELA ── */
  .table-box {
    background: #fff;
    border-radius: 16px;
    padding: 0;
    box-shadow: 0 1px 6px rgba(0, 0, 0, 0.05);
    overflow: hidden;
  }

  .table-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px 14px;
    flex-wrap: wrap;
    gap: 12px;
    border-bottom: 1px solid #f0edf8;
  }

  .table-top-title {
    font-weight: 700;
    font-size: 1rem;
    color: #1a1a1a;
  }

  /* override DataTables */
  .table-box #tabelaProdutos_wrapper {
    padding: 0 20px 20px;
  }

  .table-box #tabelaProdutos_filter {
    margin-bottom: 12px;
  }

  .table-box #tabelaProdutos_filter input {
    border: 1.5px solid #e5e0da;
    border-radius: 9px;
    padding: 7px 12px;
    font-size: 0.88rem;
    outline: none;
    font-family: "Inter", sans-serif;
    transition: border-color 0.2s;
  }

  .table-box #tabelaProdutos_filter input:focus {
    border-color: #8b5cf6;
  }

  .table-box #tabelaProdutos_filter label {
    font-size: 0.85rem;
    color: #888;
    font-weight: 500;
  }

  .table-box #tabelaProdutos_length label {
    color: #888;
    font-size: 0.82rem;
  }
  .table-box #tabelaProdutos_info {
    color: #aaa;
    font-size: 0.8rem;
  }
  .table-box #tabelaProdutos_paginate .paginate_button {
    border-radius: 7px !important;
    border: none !important;
    font-size: 0.82rem !important;
  }
  .table-box #tabelaProdutos_paginate .paginate_button.current {
    background: #8b5cf6 !important;
    color: #fff !important;
  }

  table#tabelaProdutos {
    width: 100% !important;
    border-collapse: collapse;
    font-size: 0.88rem;
  }

  table#tabelaProdutos thead th {
    background: #faf9ff;
    color: #888;
    font-weight: 600;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 12px 14px;
    border-bottom: 1px solid #f0edf8;
    white-space: nowrap;
  }

  table#tabelaProdutos tbody td {
    padding: 12px 14px;
    border-bottom: 1px solid #faf9ff;
    vertical-align: middle;
    color: #333;
  }

  table#tabelaProdutos tbody tr:hover td {
    background: #faf9ff;
  }
  table#tabelaProdutos tbody tr:last-child td {
    border-bottom: none;
  }

  table#tabelaProdutos tfoot td {
    padding: 12px 14px;
    font-weight: 700;
    background: #faf9ff;
    border-top: 2px solid #f0edf8;
    color: #555;
    font-size: 0.88rem;
  }

  /* badges */
  .badge-estoque {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
  }
  .badge-ok {
    background: #d1fae5;
    color: #065f46;
  }
  .badge-baixo {
    background: #fef3c7;
    color: #92400e;
  }
  .badge-zero {
    background: #fee2e2;
    color: #991b1b;
  }

  /* botões de ação */
  .btn-acao {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 12px;
    border-radius: 7px;
    border: none;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition:
      background 0.15s,
      transform 0.1s;
  }
  .btn-acao:hover {
    transform: translateY(-1px);
  }
  .btn-editar {
    background: #ede9ff;
    color: #6d28d9;
  }
  .btn-editar:hover {
    background: #ddd6fe;
  }
  .btn-remover {
    background: #fee2e2;
    color: #991b1b;
  }
  .btn-remover:hover {
    background: #fecaca;
  }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.45);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(3px);
  }
  .modal-overlay.aberto {
    display: flex;
  }

  .modal-box {
    background: #fff;
    border-radius: 20px;
    padding: 32px;
    width: 100%;
    max-width: 540px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
    animation: modalIn 0.2s ease;
  }

  @keyframes modalIn {
    from {
      transform: translateY(20px);
      opacity: 0;
    }
    to {
      transform: translateY(0);
      opacity: 1;
    }
  }

  .modal-header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .modal-titulo {
    font-size: 1.2rem;
    font-weight: 700;
    color: #1a1a1a;
  }

  .btn-fechar {
    background: #f5f3f0;
    border: none;
    width: 34px;
    height: 34px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #888;
    font-size: 1rem;
    transition: background 0.15s;
  }
  .btn-fechar:hover {
    background: #fee2e2;
    color: #e74c3c;
  }

  /* form */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 16px;
  }

  .form-grid .full {
    grid-column: 1 / -1;
  }

  .campo-label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    color: #555;
    margin-bottom: 5px;
  }
  .campo-label .req {
    color: #e74c3c;
  }

  .campo-input,
  .campo-select {
    width: 100%;
    padding: 9px 12px;
    border: 1.5px solid #e5e0da;
    border-radius: 9px;
    font-size: 0.9rem;
    color: #1a1a1a;
    background: #fff;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  .campo-input:focus,
  .campo-select:focus {
    border-color: #8b5cf6;
  }

  /* upload imagem */
  .upload-area {
    border: 2px dashed #e5e0da;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition:
      border-color 0.2s,
      background 0.2s;
    margin-bottom: 20px;
  }
  .upload-area:hover {
    border-color: #8b5cf6;
    background: #faf9ff;
  }
  .upload-area input[type="file"] {
    display: none;
  }
  .upload-area .upload-icon {
    font-size: 2rem;
    margin-bottom: 8px;
  }
  .upload-area .upload-text {
    font-size: 0.83rem;
    color: #888;
  }

  .preview-img {
    max-width: 100%;
    max-height: 140px;
    border-radius: 10px;
    display: none;
    margin: 10px auto 0;
  }

  /* botões modal */
  .modal-botoes {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 4px;
  }

  .btn-cancelar {
    padding: 10px 20px;
    background: #f5f3f0;
    border: none;
    border-radius: 9px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    color: #555;
    transition: background 0.15s;
  }
  .btn-cancelar:hover {
    background: #ede9ff;
  }

  .btn-salvar {
    padding: 10px 24px;
    background: #8b5cf6;
    color: #fff;
    border: none;
    border-radius: 9px;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-salvar:hover {
    background: #7c3aed;
  }

  /* responsivo */
  @media (max-width: 600px) {
    .prod-wrap {
      padding: 20px 16px;
    }
    .form-grid {
      grid-template-columns: 1fr;
    }
    .modal-box {
      padding: 24px 18px;
    }
  }
</style>

<div class="prod-wrap">
  <!-- CABEÇALHO -->
  <div class="prod-header">
    <div>
      <h1 class="prod-title">Produtos</h1>
      <p class="prod-subtitle">Gerencie seu estoque de produtos</p>
    </div>
    <button class="btn-novo" onclick="abrirModalProduto()">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M5 12h14" />
        <path d="M12 5v14" />
      </svg>
      Novo Produto
    </button>
  </div>

  <!-- CARDS DE RESUMO -->
  <div class="resumo-grid">
    <div class="resumo-card">
      <div class="rc-label">Total em Estoque</div>
      <div class="rc-valor" id="totalEstoque">R$ 0,00</div>
    </div>
    <div class="resumo-card">
      <div class="rc-label">Lucro Potencial</div>
      <div class="rc-valor verde" id="totalLucro">R$ 0,00</div>
    </div>
    <div class="resumo-card">
      <div class="rc-label">Total de Produtos</div>
      <div class="rc-valor azul" id="totalProdutos">0</div>
    </div>
    <div class="resumo-card">
      <div class="rc-label">Total de Estoque</div>
      <div class="rc-valor vermelho" id="totaldeEstoque">0</div>
    </div>
  </div>

  <!-- TABELA -->
  <div class="table-box">
    <div class="table-top">
      <span class="table-top-title">Lista de Produtos</span>
    </div>
    <table id="tabelaProdutos" class="display nowrap" style="width: 100%">
      <thead>
        <tr>
          <th>Produto</th>
          <th>Código</th>
          <th>Marca</th>
          <th>Qtd.</th>
          <th>Preço Custo</th>
          <th>Preço Venda</th>
          <th>Val. Estoque</th>
          <th>Lucro</th>
          <th>Ações</th>
        </tr>
      </thead>

      <tbody id="listaProdutos"></tbody>
    </table>
  </div>
</div>

<!-- ═══ MODAL PRODUTO ═══ -->
<div class="modal-overlay" id="modalProduto">
  <div class="modal-box">
    <div class="modal-header-row">
      <span class="modal-titulo" id="modalTitulo">Novo Produto</span>
      <button class="btn-fechar" onclick="fecharModalProduto()">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M18 6 6 18" />
          <path d="m6 6 12 12" />
        </svg>
      </button>
    </div>

    <form id="formProduto" enctype="multipart/form-data">
      <div class="form-grid">
        <div class="full">
          <label class="campo-label"
            >Nome do Produto <span class="req">*</span></label
          >
          <input
            class="campo-input"
            type="text"
            id="nome"
            placeholder="Ex: Sérum Facial Vitamina C"
            required
          />
        </div>

        <div>
          <label class="campo-label">Código</label>
          <input
            class="campo-input"
            type="text"
            id="codigo"
            placeholder="Código"
          />
        </div>

        <div>
          <label class="campo-label">Marca</label>
          <select class="campo-select" id="marca">
            <option value="Boticário">Boticário</option>
            <option value="Eudora">Eudora</option>
            <option value="Natura">Natura</option>
            <option value="Avon">Avon</option>
            <option value="Outra">Outra</option>
          </select>
        </div>

        <div>
          <label class="campo-label"
            >Quantidade <span class="req">*</span></label
          >
          <input
            class="campo-input"
            type="number"
            id="quantidade"
            placeholder="0"
            min="0"
            required
          />
        </div>

        <div>
          <label class="campo-label"
            >Preço de Custo <span class="req">*</span></label
          >
          <input
            class="campo-input"
            type="number"
            id="preco_custo"
            placeholder="0,00"
            step="0.01"
            min="0"
            required
          />
        </div>

        <div>
          <label class="campo-label"
            >Preço de Venda <span class="req">*</span></label
          >
          <input
            class="campo-input"
            type="number"
            id="preco_venda"
            placeholder="0,00"
            step="0.01"
            min="0"
            required
          />
        </div>
      </div>

      <!-- Upload imagem -->
      <div
        class="upload-area"
        onclick="document.getElementById('imagemProduto').click()"
      >
        <input
          type="file"
          name="imagemProduto"
          id="imagemProduto"
          accept="image/*"
          onchange="previewImagem(event)"
        />
        <div class="upload-icon">📷</div>
        <div class="upload-text">
          Clique para adicionar imagem do produto<br /><small>(opcional)</small>
        </div>
        <img id="previewImagem" class="preview-img" />
      </div>

      <div class="modal-botoes">
        <button
          type="button"
          class="btn-cancelar"
          onclick="fecharModalProduto()"
        >
          Cancelar
        </button>
        <button type="submit" class="btn-salvar">Salvar Produto</button>
      </div>
    </form>
  </div>
</div>

<script>
  // Preview imagem
  function previewImagem(event) {
    var file = event.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function (e) {
      var img = document.getElementById("previewImagem");
      img.src = e.target.result;
      img.style.display = "block";
    };
    reader.readAsDataURL(file);
  }

  // Espelha totais nos cards de resumo — sem const no escopo global
  function atualizarCards() {
    var est = document.getElementById("totalEstoque");
    var luc = document.getElementById("totalLucro");
    var est2 = document.getElementById("totalEstoque2");
    var luc2 = document.getElementById("totalLucro2");
    var tp = document.getElementById("totalProdutos");
    var tpest = document.getElementById("totaldeEstoque");

    if (est && est2) est2.textContent = est.textContent;
    if (luc && luc2) luc2.textContent = luc.textContent;
    if (tp && window.tabela) tp.textContent = tabela.data().rows().count();
    // Total de ESTOQUE (soma das quantidades)
    if (tpest && window.tabela) {
      const total = tabela
        .data()
        .toArray()
        .reduce((acc, row) => {
          // Ajuste 'quantidade' para o nome da sua coluna de estoque
          return acc + (parseFloat(row[3]) || 0);
        }, 0);
      tpest.textContent = total;
    }
  }

  // Desconecta observer anterior se existir (evita duplicatas no reload)
  if (window._prodObserver) {
    window._prodObserver.disconnect();
  }
  window._prodObserver = new MutationObserver(atualizarCards);

  var estEl = document.getElementById("totalEstoque");
  var lucEl = document.getElementById("totalLucro");
  if (estEl)
    window._prodObserver.observe(estEl, {
      childList: true,
      characterData: true,
      subtree: true,
    });
  if (lucEl)
    window._prodObserver.observe(lucEl, {
      childList: true,
      characterData: true,
      subtree: true,
    });

  // Modal — abre/fecha
  /*function abrirModalProduto() {
    var produtoEditando = null;
    document.getElementById("formProduto").reset();
    document.getElementById("previewImagem").style.display = "none";
    document.getElementById("modalTitulo").textContent = "Novo Produto";
    document.getElementById("modalProduto").classList.add("aberto");
  }

  function fecharModalProduto() {
    document.getElementById("modalProduto").classList.remove("aberto");
  }*/

  // Fecha ao clicar fora do modal-box
  document
    .getElementById("modalProduto")
    .addEventListener("click", function (e) {
      if (e.target === this) fecharModalProduto();
    });

  // Editar produto — atualiza título do modal
  /*function editarProduto(produto) {
    document.getElementById("nome").value = produto.nome;
    document.getElementById("codigo").value = produto.codigo || "";
    document.getElementById("marca").value = produto.marca;
    document.getElementById("quantidade").value = produto.quantidade;
    document.getElementById("preco_custo").value = produto.preco_custo;
    document.getElementById("preco_venda").value = produto.preco_venda;
    produtoEditando = produto.id;
    document.getElementById("modalTitulo").textContent = "Editar Produto";
    document.getElementById("modalProduto").classList.add("aberto");
  }*/

  // Injeta estilo dos botões da tabela apenas uma vez
  if (!document.getElementById("_styleBtnsProdutos")) {
    var style = document.createElement("style");
    style.id = "_styleBtnsProdutos";
    style.textContent = [
      ".btnEditar{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:7px;border:none;font-size:.78rem;font-weight:600;cursor:pointer;background:#ede9ff;color:#6d28d9;transition:background .15s}",
      ".btnEditar:hover{background:#ddd6fe}",
      ".btnRemover{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:7px;border:none;font-size:.78rem;font-weight:600;cursor:pointer;background:#fee2e2;color:#991b1b;transition:background .15s;margin-left:4px}",
      ".btnRemover:hover{background:#fecaca}",
    ].join("");
    document.head.appendChild(style);
  }
</script>
