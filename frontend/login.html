<section class="vh-100">

    <head>
        <link rel="stylesheet" href="./css/style.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <link href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/6.4.0/mdb.min.css" rel="stylesheet" />
    </head>
    <style>
        /* Corrigir autofill do navegador */
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0px 1000px #1a1a1a inset !important;
            box-shadow: 0 0 0px 1000px #1a1a1a inset !important;
            -webkit-text-fill-color: #ffffff !important;
            caret-color: #ffffff;
            border: 1px solid #555;
            transition: background-color 9999s ease-in-out 0s;
        }

        .exemplo-texto {
            font-size: 1.5rem;
            /* deixa maior que o normal */
            font-weight: bold;
            /* médio/grosso */
            color: #d292ff;
            /* cor escura */
            max-width: 600px;
            /* largura máxima para quebrar linha bonito */
            line-height: 1.5;
            /* espaço entre linhas */
            white-space: pre-wrap;
            /* respeita quebras de linha \n */
            font-family: "Arial", sans-serif;
            /* ou qualquer fonte clean */
            margin: 20px auto;
            /* centralizado horizontalmente */
            border-right: 2px solid #111;
            /* efeito cursor */
            padding-right: 5px;
            animation: piscarCursor 0.8s steps(1) infinite;
        }

        @keyframes piscarCursor {

            0%,
            50% {
                border-color: #111;
            }

            51%,
            100% {
                border-color: transparent;
            }
        }

        .divider:after,
        .divider:before {
            content: "";
            flex: 1;
            height: 1px;
            background: #eee;
        }


        body {
            /*background-color: #181818;*/
            background-color: #100B05;
            /* Substitua pela cor desejada */
        }

        .h-custom {
            height: calc(100% - 73px);
        }

        .senha-container {
            position: relative;
        }

        .senha-container input {
            width: 100%;
            padding-right: 40px;
        }

        .senha-container {
            position: relative;
        }

        .toggle-senha {
            position: absolute;
            right: 15px;
            top: 55%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
        }
    </style>
    <div class="container-fluid h-custom">
        <div class="row d-flex justify-content-center align-items-center h-100">
            <div class="col-md-9 col-lg-6 col-xl-5">

                <!--<img src="https://img.freepik.com/vetores-premium/logotipo-de-perfume-vetor-icone-ilustracao-logotipo-de-design-para-loja-de-perfumes-de-estilo-de-vida-e-empresa-de-marca_611015-3789.jpg?semt=ais_hybrid&w=740&q=80"
                <img
                    src="https://img.freepik.com/vetores-premium/logotipo-de-perfume-vetor-icone-ilustracao-logotipo-de-design-para-loja-de-perfumes-de-estilo-de-vida-e-empresa-de-marca_611015-3787.jpg?semt=ais_hybrid&w=740&q=80"
                    class="img-fluid" alt="Sample image">-->
                <div id="textoExemplo" class="exemplo-texto"></div>
            </div>

            <div class="col-md-8 col-lg-6 col-xl-4 offset-xl-1">
                <form>
                    <div class="d-flex flex-row align-items-center justify-content-center justify-content-lg-start">
                        <p class="text-white lead fw-normal mb-0 me-3">Logar-se</p>
                    </div>
                    <br>
                    <!-- Email input -->
                    <div data-mdb-input-init class="form-outline mb-4">
                        <input type="email" id="email" class="text-white form-control form-control-lg"
                            placeholder="Insira um endereço de e-mail válido" required />
                        <label class="text-white form-label" required autocomplete="email">Email</label>
                    </div>

                    <!-- Password input -->
                    <div data-mdb-input-init class="form-outline mb-3 senha-container">

                        <input type="password" id="senha" class="text-white form-control form-control-lg"
                            placeholder="Insira sua senha" required autocomplete="current-password">

                        <label class="text-white form-label">Senha</label>

                        <span class="toggle-senha" onclick="toggleSenha()"><i class="fa fa-eye"></i></i></span>

                    </div>

                    <div class=" text-center text-lg-start mt-4 pt-2">
                        <button type="button" data-mdb-button-init data-mdb-ripple-init class="btn btn-primary btn-lg"
                            style="padding-left: 2.5rem; background-color: #d292ff; padding-right: 2.5rem;"
                            onclick="login()">Login</button>

                        <p onclick="window.location.href='cadastro.html'"
                            class="text-white small fw-bold mt-2 pt-1 mb-0">Não possui uma conta? <a href="#!"
                                class="link-danger" onclick="cadastrarUsuario()">Cadastrar</a></p>
                    </div>

                </form>
            </div>
        </div>
    </div>
    <div class="d-flex flex-column flex-md-row text-center text-md-start justify-content-between py-4 px-4 px-xl-5">
        <!-- Copyright -->
        <div class="text-white mb-3 mb-md-0">
            Copyright © 2025. All rights reserved.
        </div>
        <!-- Copyright -->
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/6.4.0/mdb.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/script.js"></script>
    <script src="js/login.js"></script>
    <script src="js/cadastro.js"></script>
</section>
