        <li>

      <div class="dropdown">
        <a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle"
           data-bs-toggle="dropdown" aria-expanded="false">
          <strong id="emailUsuario"></strong>

    <!-- CONTEÚDO -->
    <div class="main-content" id="content">
      <!-- Aqui será carregado o conteúdo dinamicamente (, etc) -->
       <main id="conteudoPrincipal">
    <h2>Bem-vindo ao sistema!</h2>
    <p>Escolha uma opção no menu à esquerda.</p>
</main>
    </div>
  </main>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- jQuery e DataTables JS -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <!-- SweetAlert -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    // Mostrar email do usuário logado
    const email = localStorage.getItem("emailUsuario");
    if(email){
      document.getElementById("emailUsuario").textContent = email;
    }

    // Carregar página no content
    function carregarPagina(pagina){
      fetch(pagina)
      .then(res => res.text())
      .then(html => {
        document.getElementById("content").innerHTML = html;
        if(pagina.includes("produtos")){
          iniciarTabelaProdutos();
        }
      });
    }
  </script>

  <script src="js/script.js"></script>
  <script src="js/produtos.js"></script>
  <script>
   function carregarPagina(pagina) {
    $('#conteudoPrincipal').load(pagina, function() {
        // Se a página tiver produtos, inicializa a tabela/form
        if (typeof iniciarProdutos === "function") {
            iniciarTabelaProdutos();
        }
    });
  }
  </script>
  
</body>
